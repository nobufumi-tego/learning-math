name: Update CHANGELOG

# main への push をトリガーに、scripts/generate_changelog.py で
# CHANGELOG.md を再生成し、変更があれば自動 commit / push する。
#
# 自動コミット (chore(changelog): auto-update [skip ci]) は
# - メッセージに "[skip ci]" を含むため Actions 自身を再帰トリガーしない
# - generate_changelog.py の SKIP_SUBJECT_PATTERNS で履歴にも載らない

on:
  push:
    branches: [main]

# CHANGELOG への push 用に書き込み権限が必要
permissions:
  contents: write

# 同時実行を抑止 (連続 push 時のレース防止)
concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # 自動コミット自身が走った場合はスキップ (二重防御)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate CHANGELOG.md
        run: python scripts/generate_changelog.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to CHANGELOG.md"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG.md was updated"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): auto-update [skip ci]"
          git push
